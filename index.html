<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="고래 실시간 추적 — BTC·ETH·EGG 멀티체인 고래 감시 시스템">
<title>🐋 고래 실시간 추적</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --bg:#07090F;--surface:#0E1117;--card:#131720;
  --border:rgba(255,255,255,0.06);
  --blue:#4F8EF7;--blue2:#7B61FF;--cyan:#00D4FF;
  --green:#00E5A0;--red:#FF4D6D;--gold:#FFB547;
  --text:#F0F2F8;--muted:rgba(240,242,248,0.45);
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(79,142,247,0.07) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(123,97,255,0.07) 0%,transparent 50%);
}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 48px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,9,15,0.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-size:18px;font-weight:800;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-sub{font-size:11px;color:var(--muted);margin-left:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.section-label{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
/* WHALE STYLES */
.wh-hero{padding:80px 48px 20px;max-width:1200px;margin:0 auto}
.wh-topbar{display:flex;align-items:center;gap:12px;padding:8px 48px;background:rgba(14,17,23,.9);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:64px;z-index:50;backdrop-filter:blur(10px)}
.wh-stat{display:flex;flex-direction:column;gap:1px;border-left:1px solid var(--border);padding-left:10px}
.wh-stat .wsl{font-size:9px;color:var(--muted)}
.wh-stat .wsv{font-size:13px;font-weight:700;color:var(--text)}
.wsv.wg{color:var(--green)!important}.wsv.wr{color:var(--red)!important}.wsv.wy{color:var(--gold)!important}.wsv.wc{color:var(--cyan)!important}.wsv.wp{color:#B388FF!important}
.wh-pulse{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px}
.wh-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.wh-dot.on{background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 1.5s infinite}
.wh-dot.spin{background:var(--gold);box-shadow:0 0 7px var(--gold);animation:pulse .5s infinite}
.wh-bar{display:flex;gap:5px;align-items:center;padding:7px 48px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg)}
.wh-ctab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:6px 12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;transition:all .2s}
.wh-ctab.on{color:var(--green);border-bottom-color:var(--green)}
.wh-ctab.btcon.on{color:var(--gold);border-bottom-color:var(--gold)}
.wh-ctab.solon.on{color:#9945FF;border-bottom-color:#9945FF}
.wh-ctab.eggon.on{color:#FF8C42;border-bottom-color:#FF8C42}
.wh-sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.wh-sf{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 9px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:500;border-radius:100px;transition:all .15s}
.wh-sf.on{background:rgba(0,229,160,.1);border-color:var(--green);color:var(--green)}
.wh-sf.on.ss{background:rgba(255,77,109,.1);border-color:var(--red);color:var(--red)}
.wh-sf.on.sc{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan)}
.wh-sf.on.sp{background:rgba(179,136,255,.1);border-color:#B388FF;color:#B388FF}
.wh-sf.on.sy{background:rgba(255,181,71,.1);border-color:var(--gold);color:var(--gold)}
.wh-sf.on.so{background:rgba(255,140,66,.1);border-color:#FF8C42;color:#FF8C42}
.wh-prog{height:2px;background:var(--border)}
.wh-pbar{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));width:0%;transition:width .3s}
.wh-layout{display:flex;min-height:calc(100vh - 220px)}
.wh-lp{width:210px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface)}
.wh-lhdr{padding:7px 12px;border-bottom:1px solid var(--border);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:flex;justify-content:space-between}
.wh-wi{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.wh-wi:hover{background:rgba(255,255,255,.03)}
.wh-wn{font-size:11px;color:var(--text);font-weight:500;display:flex;justify-content:space-between;align-items:center}
.wh-wa{font-size:9px;color:var(--muted);margin-top:1px}
.wh-wt{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.wh-tg{font-size:8px;padding:1px 5px;border-radius:4px}
.wh-tg.exchange{background:rgba(79,142,247,.1);color:var(--blue)}
.wh-tg.whale,.wh-tg.smart{background:rgba(0,229,160,.1);color:var(--green)}
.wh-tg.foundation{background:rgba(255,181,71,.1);color:var(--gold)}
.wh-tg.korean{background:rgba(255,77,109,.1);color:var(--red)}
.wh-cd{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.wh-cd.eth{background:#627EEA}.wh-cd.btc{background:var(--gold)}.wh-cd.sol{background:#9945FF}.wh-cd.egg{background:#FF8C42}
.wh-fc{flex:1;min-height:400px}
.wh-feed{padding:10px;display:flex;flex-direction:column;gap:5px}
.wh-empty{padding:80px 24px;text-align:center;color:var(--muted)}
.wh-card{background:var(--card);border:1px solid var(--border);border-radius:12px;border-left:3px solid var(--border);padding:12px 16px;transition:border-color .2s}
.wh-card.buy{border-left-color:var(--green)}.wh-card.sell{border-left-color:var(--red)}
.wh-card.sleep{border-left-color:var(--cyan)}.wh-card.newwhale{border-left-color:#B388FF}
.wh-card.foundation{border-left-color:var(--gold)}.wh-card.flow{border-left-color:var(--blue)}.wh-card.acc{border-left-color:#FF8C42}
.wh-ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.wh-cn{font-size:13px;font-weight:700}
.wh-cn.buy{color:var(--green)}.wh-cn.sell{color:var(--red)}.wh-cn.sleep{color:var(--cyan)}
.wh-cn.newwhale{color:#B388FF}.wh-cn.foundation{color:var(--gold)}.wh-cn.flow{color:var(--blue)}.wh-cn.acc{color:#FF8C42}
.wh-cm{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.wh-ct{font-size:10px;color:var(--muted)}
.wh-cb{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.wh-cb.eth{background:rgba(98,126,234,.15);color:#627EEA}.wh-cb.btc{background:rgba(255,181,71,.15);color:var(--gold)}
.wh-cb.sol{background:rgba(153,69,255,.15);color:#9945FF}.wh-cb.egg{background:rgba(255,140,66,.15);color:#FF8C42}
.wh-body{display:flex;gap:14px;align-items:flex-start}
.wh-ac{flex-shrink:0;min-width:110px}
.wh-am{font-size:18px;font-weight:800;line-height:1}
.wh-am.buy{color:var(--green)}.wh-am.sell{color:var(--red)}.wh-am.sleep{color:var(--cyan)}
.wh-am.newwhale{color:#B388FF}.wh-am.foundation{color:var(--gold)}.wh-am.flow{color:var(--blue)}.wh-am.acc{color:#FF8C42}
.wh-usd{font-size:10px;color:var(--muted);margin-top:2px}
.wh-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:100px;margin-top:5px;font-weight:600}
.wh-badge.buy{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.3)}
.wh-badge.sell{background:rgba(255,77,109,.1);color:var(--red);border:1px solid rgba(255,77,109,.3)}
.wh-badge.sleep{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3)}
.wh-badge.newwhale{background:rgba(179,136,255,.1);color:#B388FF;border:1px solid rgba(179,136,255,.3)}
.wh-badge.foundation{background:rgba(255,181,71,.1);color:var(--gold);border:1px solid rgba(255,181,71,.3)}
.wh-badge.flow{background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.3)}
.wh-badge.acc{background:rgba(255,140,66,.1);color:#FF8C42;border:1px solid rgba(255,140,66,.3)}
.wh-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.wh-fl{display:flex;align-items:center;gap:5px;font-size:10px;flex-wrap:wrap}
.wh-addr{font-size:10px;color:var(--muted)}
.wh-link{font-size:10px;color:var(--muted);text-decoration:none;margin-top:3px;display:inline-block}
.wh-link:hover{color:var(--cyan)}
@media(max-width:768px){
  .wh-hero,.wh-topbar,.wh-bar{padding-left:16px;padding-right:16px}
  .wh-lp{display:none}
  nav{padding:0 16px}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav>
  <div style="display:flex;align-items:center">

  '0xf584f8728b874a6a5c7a8d4d387c9aae9172d621':{name:'Jump Trading',type:'smart',chain:'eth'},
};
var _BTC_W=[
  {addr:'34xp4vRoCGJym3xR7yCVPFHoCNxv4Twseo',name:'Binance Cold',type:'exchange'},
  {addr:'1NDyJtNTjmwk5xPNhjgAMu4HDHigtobu1s',name:'Binance 2',type:'exchange'},
  {addr:'3Cbq7aT1tY8kMxWLbitaG7yT6bPbKChq64',name:'Huobi BTC',type:'exchange'},
  {addr:'3D2oetdNuZUqQHPJmcMDDHYoqkyNVsFk9r',name:'Bitfinex Cold',type:'exchange'},
  {addr:'1AnwDVbwsLBVwRfqN2x9Eo4YEJSPXo2cwG',name:'Kraken BTC',type:'exchange'},
];

// 페이지 로드시 자동 시작
window.addEventListener('load', function(){
  const s=localStorage.getItem('_wh_cfg');
  if(s)_whCfg={..._whCfg,...JSON.parse(s)};
  Object.keys(_WH_W).forEach(a=>_whSeen.add(a));
  whRenderW();
  whLoadEgg();
  whSetDot('spin','스캔중...');
  setTimeout(()=>{whScan();setInterval(whScan,90000);setInterval(whDQ,60000);},500);
});

async function whLoadEgg(){
  try{
    const r=await fetch('https://api.ethplorer.io/getTopTokenHolders/'+_WH_EGG+'?apiKey=freekey&limit=12');
    const d=await r.json();
    if(!d.holders)return;
    _whEgg=d.holders.map((h,i)=>{
      const a=h.address.toLowerCase();
      return{addr:a,label:_WH_W[a]?.name||(i<2?'EGG 재단 추정 #'+(i+1):'EGG 고래 #'+(i+1)),type:_WH_W[a]?.type||(i<2?'foundation':'whale'),pct:((h.balance/2994901340)*100).toFixed(2)};
    });
    whRenderW();
  }catch(e){}
}

function whRenderW(){
  const el=document.getElementById('wh-wlist');
  if(!el)return;
  const all=[...Object.entries(_WH_W).slice(0,14).map(([a,v])=>({...v,addr:a})),..._whEgg.slice(0,6)];
  document.getElementById('wh-wcount').textContent=all.length;
  el.innerHTML=all.map(w=>`<div class="wh-wi"><div class="wh-wn"><span>${w.name||w.label}</span><span class="wh-cd ${w.chain||'egg'}"></span></div><div class="wh-wa">${(w.addr||'').slice(0,10)}...${(w.addr||'').slice(-4)}</div><div class="wh-wt"><span class="wh-tg ${w.type}">${w.type}</span><span class="wh-tg" style="background:rgba(255,255,255,.05);color:var(--muted)">${(w.chain||'egg').toUpperCase()}</span></div></div>`).join('');
}

async function whScan(){
  if(_whBusy)return;
  _whBusy=true;
  whSetDot('spin','스캔중...');
  const bar=document.getElementById('wh-pbar');
  const wl=Object.entries(_WH_W);
  for(let i=0;i<wl.length;i++){
    if(bar)bar.style.width=((i+1)/wl.length*60)+'%';
    await whCheckETH(...wl[i]);
    await whSleep(160);
  }
  for(let i=0;i<_whEgg.length;i++){
    if(bar)bar.style.width=(60+(i+1)/_whEgg.length*25)+'%';
    await whCheckEgg(_whEgg[i]);
    await whSleep(180);
  }
  if(bar)bar.style.width='88%';
  await whCheckBTC();
  if(bar)bar.style.width='94%';
  await whCheckSOL();
  if(bar){bar.style.width='100%';setTimeout(()=>bar.style.width='0%',400);}
  whSetDot('on','추적중 — '+new Date().toLocaleTimeString('ko-KR'));
  _whBusy=false;
}

async function whCheckETH(addr,info){
  try{
    const r=await fetch('/api/eth?module=account&action=txlist&address='+addr+'&page=1&offset=5&sort=desc&_='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const d=await r.json();
    if(!Array.isArray(d.result)||!d.result.length)return;
    const tx=d.result[0];
    const eth=Number(tx.value)/1e18;
    if(eth<0.01)return; // 0.01 ETH 미만 무시
    const from=(tx.from||'').toLowerCase(),to=(tx.to||'').toLowerCase(),isSend=from===addr;
    const toI=_WH_W[to],frI=_WH_W[from];
    let type,icon;
    if(info.type==='foundation'&&isSend){type='foundation';icon='⚠️';}
    else if(toI||frI){type=isSend?'sell':'buy';icon=isSend?'🔴':'🟢';}
    else if(!isSend&&whIsNew(from,eth*_WH_P.eth)){type='newwhale';icon='🆕';}
    else{type=isSend?'flow':'buy';icon=isSend?'🔄':'🟢';}
    if(!isSend&&['buy','newwhale'].includes(type)&&whAcc(addr,eth)){type='acc';icon='🟠';}
    const amt=eth.toFixed(4)+'ETH';
    whAdd({id:tx.hash,chain:'eth',type,icon,label:info.name,wtype:info.type,amt,unit:'',usd:Math.round(eth*_WH_P.eth),from:tx.from||'',to:tx.to||'',frL:frI?.name,toL:toI?.name,isSend,hash:tx.hash,url:'https://etherscan.io/tx/'+tx.hash});
  }catch(e){}
}

async function whCheckEgg(w){
  try{
    const r=await fetch('/api/eth?module=account&action=tokentx&contractaddress='+_WH_EGG+'&address='+w.addr+'&page=1&offset=5&sort=desc&_='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const d=await r.json();
    if(!Array.isArray(d.result)||!d.result.length)return;
    const tx=d.result[0];
    const amt=parseFloat(tx.value)/1e18;
    if(amt<100000)return;
    const from=tx.from.toLowerCase(),to=tx.to.toLowerCase(),isSend=from===w.addr;
    const toE=_WH_W[to],frE=_WH_W[from];
    let type,icon;
    if(w.type==='foundation'&&isSend){type='foundation';icon='⚠️';}
    else if(toE){type='sell';icon='🔴';}
    else if(frE){type='buy';icon='🟢';}
    else if(!isSend&&whIsNew(from,amt*_WH_P.egg)){type='newwhale';icon='🆕';}
    else{type=isSend?'flow':'buy';icon=isSend?'🔄':'🟢';}
    if(!isSend&&type==='buy'&&whAcc(w.addr,amt)){type='acc';icon='🟠';}
    whAdd({id:tx.hash,chain:'egg',type,icon,label:w.label,wtype:w.type,amt:whFmt(amt),unit:'EGG',usd:Math.round(amt*_WH_P.egg),from:tx.from,to:tx.to,frL:frE?.name,toL:toE?.name,isSend,hash:tx.hash,url:'https://etherscan.io/tx/'+tx.hash});
  }catch(e){}
}

async function whCheckBTC(){
  for(const w of _BTC_W){
    try{
      const r=await fetch('/api/btc?address='+w.addr+'&_='+Date.now(),{cache:'no-store'});
      if(!r.ok)continue;
      const d=await r.json();
      if(!d.txs?.length)continue;
      const tx=d.txs[0];
      const tot=(tx.out||[]).reduce((s,o)=>s+(o.value||0),0)/1e8;
      if(tot<5)continue;
      const isSend=(tx.inputs||[]).some(i=>i.prev_out?.addr===w.addr);
      whAdd({id:tx.hash,chain:'btc',type:isSend?'sell':'buy',icon:isSend?'🔴':'🟢',label:w.name,wtype:w.type,amt:tot.toFixed(2),unit:'BTC',usd:Math.round(tot*_WH_P.btc),from:isSend?w.addr:'unknown',to:isSend?'unknown':w.addr,frL:isSend?w.name:null,toL:isSend?null:w.name,isSend,hash:tx.hash,url:'https://www.blockchain.com/btc/tx/'+tx.hash});
      await whSleep(400);
    }catch(e){await whSleep(200);}
  }
}

async function whCheckSOL(){
  for(const w of _SOL_W){
    try{
      const r=await fetch('/api/sol?address='+w.addr+'&_='+Date.now(),{cache:'no-store'});
      if(!r.ok)continue;
      const res=await r.json();
      const txs=res.data;
      if(!Array.isArray(txs)||!txs.length)continue;
      const tx=txs[0];
      let sol=0,isSend=false;
      if(res.source==='helius'){
        for(const t of tx.nativeTransfers||[]){
          if(t.fromUserAccount===w.addr){sol=t.amount/1e9;isSend=true;break;}
          if(t.toUserAccount===w.addr){sol=t.amount/1e9;isSend=false;break;}
        }
      }else{sol=Math.abs((tx.lamport||0)/1e9);isSend=(tx.src===w.addr);}
      if(sol<500)continue;
      const usd=Math.round(sol*_WH_P.sol);
      let type,icon;
      if(w.type==='foundation'&&isSend){type='foundation';icon='⚠️';}
      else if(w.type==='korean'||w.type==='exchange'){type=isSend?'sell':'buy';icon=isSend?'🔴':'🟢';}
      else if(!isSend&&whIsNew(w.addr,usd)){type='newwhale';icon='🆕';}
      else{type=isSend?'flow':'buy';icon=isSend?'🔄':'🟢';}
      if(!isSend&&type==='buy'&&whAcc(w.addr,sol)){type='acc';icon='🟠';}
      const sig=tx.signature||tx.txHash||'';
      whAdd({id:sig||w.addr+Date.now(),chain:'sol',type,icon,label:w.name,wtype:w.type,amt:sol.toFixed(0),unit:'SOL',usd,from:isSend?w.addr:'unknown',to:isSend?'unknown':w.addr,frL:isSend?w.name:null,toL:isSend?null:w.name,isSend,hash:sig,url:'https://solscan.io/tx/'+sig});
      await whSleep(300);
    }catch(e){await whSleep(200);}
  }
}

function whIsNew(addr,usd){
  if(usd<500000||_whSeen.has(addr))return false;
  _whSeen.add(addr); return true;
}
function whAcc(addr,amt){
  const now=Date.now();
  if(!_whAcc[addr])_whAcc[addr]=[];
  _whAcc[addr].push({t:now,v:amt});
  _whAcc[addr]=_whAcc[addr].filter(x=>now-x.t<86400000);
  return _whAcc[addr].length>=3;
}

async function whAdd(item){
  item.time=new Date().toLocaleTimeString('ko-KR');
  _whFeed.unshift(item);
  _whStats.total++;
  if(item.type==='foundation')_whStats.found++;
  else if(item.type==='sell')_whStats.sell++;
  else if(['buy','acc'].includes(item.type))_whStats.buy++;
  else if(item.type==='sleep')_whStats.sleep++;
  else if(item.type==='newwhale')_whStats.newW++;
  whUpdStats();whRenderFeed();
  if(_whCfg.bot&&_whCfg.paid)whSendTG(_whCfg.paid,whMsg(item,'실시간'));
  if(_whCfg.bot&&_whCfg.free)_whDQ.push({chatId:_whCfg.free,msg:whMsg(item,'1시간 전'),at:Date.now()+3600000});
}

function whMsg(item,tier){
  const e={buy:'🟢',sell:'🔴',acc:'🟠',sleep:'💤',newwhale:'🆕',foundation:'⚠️',flow:'🔄'}[item.type]||'⚪';
  const c={eth:'Ξ',btc:'₿',sol:'◎',egg:'🥚'}[item.chain]||'';
  return e+' ['+tier+'] *'+item.label+'*\n\n'+c+' '+item.amt+' '+item.unit+(item.usd>0?' (~$'+item.usd.toLocaleString()+')':'')+'\n'+(item.isSend?'📤 송금':'📥 수신')+(item.frL?'\n출처: '+item.frL:'')+(item.toL?'\n수신: '+item.toL:'')+'\n\n[확인]('+item.url+')';
}

async function whSendTG(chatId,text){
  try{await fetch('https://api.telegram.org/bot'+_whCfg.bot+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text,parse_mode:'Markdown',disable_web_page_preview:true})});}catch(e){}
}

function whDQ(){
  const now=Date.now();
  _whDQ.filter(q=>q.at<=now).forEach(q=>whSendTG(q.chatId,q.msg));
  _whDQ=_whDQ.filter(q=>q.at>now);
}

function whRenderFeed(){
  const el=document.getElementById('wh-feed');
  const emp=document.getElementById('wh-empty');
  if(!el)return;
  let v=_whFeed;
  if(_whChain!=='all')v=v.filter(i=>i.chain===_whChain);
  if(_whSig!=='all')v=v.filter(i=>i.type===_whSig);
  if(v.length&&emp)emp.style.display='none';
  el.querySelectorAll('.wh-card').forEach(e=>e.remove());
  const tL={buy:'🟢 매수',sell:'🔴 매도',acc:'🟠 매집',sleep:'💤 수면지갑',newwhale:'🆕 신규고래',foundation:'⚠️ 재단이동',flow:'🔄 대형이동'};
  v.slice(0,60).forEach(item=>{
    const div=document.createElement('div');
    div.className='wh-card '+item.type;
    const f=(item.from&&item.from!=='unknown')?item.from:'';
    const t=(item.to&&item.to!=='unknown')?item.to:'';
    const frS=item.frL?'<span class="wh-tg exchange">'+item.frL+'</span>':f?'<span class="wh-addr">'+f.slice(0,8)+'...'+f.slice(-4)+'</span>':'';
    const toS=item.toL?'<span class="wh-tg exchange">'+item.toL+'</span>':t?'<span class="wh-addr">'+t.slice(0,8)+'...'+t.slice(-4)+'</span>':'';
    div.innerHTML='<div class="wh-ch"><div style="display:flex;align-items:center;gap:6px"><span class="wh-cd '+item.chain+'"></span><span class="wh-cn '+item.type+'">'+item.icon+' '+item.label+'</span><span class="wh-tg '+item.wtype+'" style="font-size:8px">'+item.wtype+'</span></div><div class="wh-cm"><span class="wh-cb '+item.chain+'">'+item.chain.toUpperCase()+'</span><span class="wh-ct">'+item.time+'</span></div></div><div class="wh-body"><div class="wh-ac"><div class="wh-am '+item.type+'">'+item.amt+' <span style="font-size:12px">'+item.unit+'</span></div>'+(item.usd>0?'<div class="wh-usd">≈ $'+item.usd.toLocaleString()+'</div>':'')+'<span class="wh-badge '+item.type+'">'+(tL[item.type]||item.type)+'</span></div><div class="wh-info"><div class="wh-fl">'+frS+'<span style="color:var(--border)">→</span>'+toS+'</div><a class="wh-link" href="'+item.url+'" target="_blank">→ 블록체인 탐색기에서 확인</a></div></div>';
    el.insertBefore(div,el.children[1]||null);
  });
}

function whUpdStats(){
  ['wst-total','wst-found','wst-sell','wst-buy','wst-sleep','wst-new'].forEach((id,i)=>{
    const e=document.getElementById(id);
    if(e)e.textContent=[_whStats.total,_whStats.found,_whStats.sell,_whStats.buy,_whStats.sleep,_whStats.newW][i];
  });
}

function whSetChain(c,btn){_whChain=c;document.querySelectorAll('.wh-ctab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');whRenderFeed();}
function whSetSig(s,btn){_whSig=s;document.querySelectorAll('.wh-sf').forEach(b=>b.classList.remove('on'));btn.classList.add('on');whRenderFeed();}

function whSetDot(t,txt){
  const d=document.getElementById('wh-dot');
  if(!d)return;
  d.className='wh-dot'+(t==='on'?' on':t==='spin'?' spin':'');
  const s=document.getElementById('wh-ptxt');
  if(s){s.textContent=txt;s.style.color=t==='on'?'var(--green)':t==='spin'?'var(--gold)':'var(--muted)';}
}

function whFmt(n){if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e7)return(n/1e7).toFixed(1)+'천만';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return Math.round(n).toLocaleString();}
function whSleep(ms){return new Promise(r=>setTimeout(r,ms));}

function whOpenCfg(){
  document.getElementById('wh-m-bot').value=_whCfg.bot||'';
  document.getElementById('wh-m-free').value=_whCfg.free||'';
  document.getElementById('wh-m-paid').value=_whCfg.paid||'';
  document.getElementById('wh-modal').style.display='flex';
}
function whCloseCfg(){document.getElementById('wh-modal').style.display='none';}
function whSaveCfg(){
  _whCfg.bot=document.getElementById('wh-m-bot').value.trim();
  _whCfg.free=document.getElementById('wh-m-free').value.trim();
  _whCfg.paid=document.getElementById('wh-m-paid').value.trim();
  localStorage.setItem('_wh_cfg',JSON.stringify(_whCfg));
  whCloseCfg();
}
async function whTestTg(type){
  const token=document.getElementById('wh-m-bot').value.trim();
  const chatId=document.getElementById(type==='free'?'wh-m-free':'wh-m-paid').value.trim();
  if(!token||!chatId){alert('토큰과 Chat ID를 입력하세요');return;}
  try{await fetch('https://api.telegram.org/bot'+token+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text:'✅ 고래 추적기 연결 성공!'})});alert('✅ 전송 성공');}catch(e){alert('오류: '+e.message);}
}
document.getElementById('wh-modal').addEventListener('click',function(e){if(e.target===this)whCloseCfg();});
</script>
